  - |
    CREATE OR REPLACE VIEW aave_votes AS
    SELECT
        vf."proposalId",
        vf."voter",
        vf."support",
        vf.block_number,
        vf.transaction_hash,
        b.block_timestamp AS "votedAt"
    FROM event_1_voteforwarded_f78ab vf
    LEFT JOIN blocks_1 b ON b.block_number = vf.block_number
  - |
    CREATE OR REPLACE VIEW aave_vote_emitteds AS
    SELECT
        chain_id::TEXT || '-' || "proposalId"::TEXT || '-' || "voter" AS id,
        CAST(chain_id AS INT)       AS "chainId",
        CAST("proposalId" AS INT)   AS "proposalId",
        "support",
        "voter",
        CAST("votingPower" AS TEXT) AS "votingPower"
    FROM (
        SELECT 1::NUMERIC AS chain_id, "proposalId", "support", "voter", "votingPower"
          FROM event_1_voteemitted_0c611
        UNION ALL
        SELECT 137::NUMERIC, "proposalId", "support", "voter", "votingPower"
          FROM event_137_voteemitted_0c611
        UNION ALL
        SELECT 43114::NUMERIC, "proposalId", "support", "voter", "votingPower"
          FROM event_43114_voteemitted_0c611
    ) t
  - |
    CREATE OR REPLACE VIEW aave_voting_configs AS
    SELECT DISTINCT ON ("accessLevel")
        CAST("accessLevel" AS TEXT)              AS id,
        CAST("accessLevel" AS TEXT)              AS "accessLevel",
        CAST("coolDownBeforeVotingStart" AS TEXT) AS "cooldownBeforeVotingStart",
        CAST("votingDuration" AS TEXT)            AS "votingDuration",
        CAST("yesThreshold" AS TEXT)              AS "yesThreshold",
        CAST("yesNoDifferential" AS TEXT)         AS "yesNoDifferential",
        CAST("minPropositionPower" AS TEXT)        AS "minPropositionPower"
    FROM event_1_votingconfigupdated_a743f
    ORDER BY "accessLevel", block_number DESC
  - |
    CREATE OR REPLACE VIEW aave_voting_portals AS
    SELECT
        pc."proposalId",
        COALESCE(
            CASE WHEN b43."proposalId" IS NOT NULL
                 THEN '0x' || encode(b43.contract_address, 'hex') END,
            CASE WHEN b137."proposalId" IS NOT NULL
                 THEN '0x' || encode(b137.contract_address, 'hex') END,
            CASE WHEN b1."proposalId" IS NOT NULL
                 THEN '0x' || encode(b1.contract_address, 'hex') END
        ) AS id,
        COALESCE(
            CASE WHEN b43."proposalId" IS NOT NULL
                 THEN '0x' || encode(b43.contract_address, 'hex') END,
            CASE WHEN b137."proposalId" IS NOT NULL
                 THEN '0x' || encode(b137.contract_address, 'hex') END,
            CASE WHEN b1."proposalId" IS NOT NULL
                 THEN '0x' || encode(b1.contract_address, 'hex') END
        ) AS "votingMachine",
        CAST(CASE
            WHEN b43."proposalId"  IS NOT NULL THEN 43114
            WHEN b137."proposalId" IS NOT NULL THEN 137
            WHEN b1."proposalId"   IS NOT NULL THEN 1
        END AS TEXT) AS "votingMachineChainId",
        TRUE AS enabled
    FROM event_1_proposalcreated_cc914 pc
    LEFT JOIN event_43114_proposalvoteconfigurationbridged_b97f8 b43
           ON b43."proposalId" = pc."proposalId"
    LEFT JOIN event_137_proposalvoteconfigurationbridged_b97f8 b137
           ON b137."proposalId" = pc."proposalId"
    LEFT JOIN event_1_proposalvoteconfigurationbridged_b97f8 b1
           ON b1."proposalId" = pc."proposalId"
  - |
    CREATE OR REPLACE VIEW aave_proposal_transactions AS
    SELECT
        pc."proposalId",
        pc."proposalId"::TEXT AS id,
        CASE WHEN b_pc.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-created',
                'blockNumber', b_pc.block_number::TEXT,
                'timestamp',   b_pc.block_timestamp::TEXT)
        END AS created,
        CASE WHEN b_va.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-active',
                'blockNumber', b_va.block_number::TEXT,
                'timestamp',   b_va.block_timestamp::TEXT)
        END AS active,
        CASE WHEN b_pq.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-queued',
                'blockNumber', b_pq.block_number::TEXT,
                'timestamp',   b_pq.block_timestamp::TEXT)
        END AS queued,
        CASE WHEN b_pf.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-failed',
                'blockNumber', b_pf.block_number::TEXT,
                'timestamp',   b_pf.block_timestamp::TEXT)
        END AS failed,
        CASE WHEN b_pex.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-executed',
                'blockNumber', b_pex.block_number::TEXT,
                'timestamp',   b_pex.block_timestamp::TEXT)
        END AS executed,
        CASE WHEN b_pcan.block_number IS NOT NULL THEN
            json_build_object(
                'id',          pc."proposalId"::TEXT || '-canceled',
                'blockNumber', b_pcan.block_number::TEXT,
                'timestamp',   b_pcan.block_timestamp::TEXT)
        END AS canceled
    FROM event_1_proposalcreated_cc914 pc
    LEFT JOIN blocks_1 b_pc   ON b_pc.block_number   = pc.block_number
    LEFT JOIN event_1_votingactivated_45f1d  va   ON va."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_va   ON b_va.block_number   = va.block_number
    LEFT JOIN event_1_proposalqueued_e39e7   pq   ON pq."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_pq   ON b_pq.block_number   = pq.block_number
    LEFT JOIN event_1_proposalfailed_2bed8   pf   ON pf."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_pf   ON b_pf.block_number   = pf.block_number
    LEFT JOIN event_1_proposalexecuted_712ae pex  ON pex."proposalId"  = pc."proposalId"
    LEFT JOIN blocks_1 b_pex  ON b_pex.block_number  = pex.block_number
    LEFT JOIN event_1_proposalcanceled_789cf pcan ON pcan."proposalId" = pc."proposalId"
    LEFT JOIN blocks_1 b_pcan ON b_pcan.block_number = pcan.block_number
  - |
    CREATE OR REPLACE VIEW aave_proposal_payloads AS
    SELECT
        CAST(ap."proposalId" AS TEXT) || '_' || ap."payloadId"::TEXT AS id,
        CAST(ap."proposalId" AS TEXT) AS "proposalId",
        ap."chainId"::TEXT            AS "chainId",
        COALESCE(pce."maximumAccessLevelRequired"::TEXT, '0') AS "accessLevel",
        ap."payloadsController"
    FROM aave_payloads ap
    LEFT JOIN aave_payload_created_events pce
           ON pce."payloadId" = ap."payloadId"
          AND pce.chain_id    = ap."chainId"
  - |
    CREATE OR REPLACE VIEW aave_proposal_vote_summaries AS
    SELECT
        "proposalId",
        "proposalId"::TEXT AS id,
        "votesFor"         AS "forVotes",
        "votesAgainst"     AS "againstVotes"
    FROM aave_proposals

graphql:
  schema: ./schema.graphql
  entities:
    - type: Proposal
      view: aave_proposals
      id_column: proposalId
      queries:
        - name: proposals
          type: list
          order_by_fields: [proposalId]
          filters:
            - { field: state, column: state, type: Int }
            - { field: id_in, column: proposalId, type: String }
        - name: proposal
          type: single
        - name: proposalSearch
          type: search
          column: proposalId
      relations:
        - field: payloads
          view: aave_proposal_payloads
          foreign_key: proposalId
        - field: transactions
          view: aave_proposal_transactions
          foreign_key: proposalId
          singleton: true
        - field: votingPortal
          view: aave_voting_portals
          foreign_key: proposalId
          singleton: true
        - field: votingConfig
          view: aave_voting_configs
          foreign_key: accessLevel
          parent_column: accessLevel
          singleton: true
        - field: votes
          view: aave_proposal_vote_summaries
          foreign_key: proposalId
          singleton: true
    - type: VoteEmitted
      view: aave_vote_emitteds
      id_column: id
      queries:
        - name: voteEmitteds
          type: list
          filters:
            - { field: proposalId, column: proposalId, required: true, type: Int }
            - { field: chainId, column: chainId, type: Int }
