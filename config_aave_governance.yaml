# SQL executed once at startup, after all event tables are created.
# Use this for any use-case-specific views, indexes, or derived tables.
# Nothing here is read by the generic indexer — it just executes it as DDL.
#
# Table names follow the pattern:
#   event_{chain_id}_{event_name_lowercase}_{short_hash}
# where short_hash = first 5 hex chars of the event selector.
# You can always look them up with: SELECT event_name, event_hash FROM event_descriptor
setup_sql:
  - |
    CREATE OR REPLACE VIEW aave_payload_executions AS
    SELECT chain_id, "payloadId", block_number
    FROM (
        SELECT 1::NUMERIC       AS chain_id, "payloadId", block_number FROM event_1_payloadexecuted_da608
        UNION ALL
        SELECT 137::NUMERIC,               "payloadId", block_number FROM event_137_payloadexecuted_da608
        UNION ALL
        SELECT 43114::NUMERIC,             "payloadId", block_number FROM event_43114_payloadexecuted_da608
        UNION ALL
        SELECT 42161::NUMERIC,             "payloadId", block_number FROM event_42161_payloadexecuted_da608
        UNION ALL
        SELECT 10::NUMERIC,                "payloadId", block_number FROM event_10_payloadexecuted_da608
        UNION ALL
        SELECT 56::NUMERIC,                "payloadId", block_number FROM event_56_payloadexecuted_da608
        UNION ALL
        SELECT 8453::NUMERIC,              "payloadId", block_number FROM event_8453_payloadexecuted_da608
        UNION ALL
        SELECT 1088::NUMERIC,              "payloadId", block_number FROM event_1088_payloadexecuted_da608
        UNION ALL
        SELECT 100::NUMERIC,               "payloadId", block_number FROM event_100_payloadexecuted_da608
        UNION ALL
        SELECT 42220::NUMERIC,             "payloadId", block_number FROM event_42220_payloadexecuted_da608
        UNION ALL
        SELECT 59144::NUMERIC,             "payloadId", block_number FROM event_59144_payloadexecuted_da608
        UNION ALL
        SELECT 534352::NUMERIC,            "payloadId", block_number FROM event_534352_payloadexecuted_da608
        UNION ALL
        SELECT 1868::NUMERIC,              "payloadId", block_number FROM event_1868_payloadexecuted_da608
        UNION ALL
        SELECT 146::NUMERIC,               "payloadId", block_number FROM event_146_payloadexecuted_da608
        UNION ALL
        SELECT 324::NUMERIC,               "payloadId", block_number FROM event_324_payloadexecuted_da608
        UNION ALL
        SELECT 57073::NUMERIC,             "payloadId", block_number FROM event_57073_payloadexecuted_da608
        UNION ALL
        SELECT 9745::NUMERIC,              "payloadId", block_number FROM event_9745_payloadexecuted_da608
        UNION ALL
        SELECT 60808::NUMERIC,             "payloadId", block_number FROM event_60808_payloadexecuted_da608
        UNION ALL
        SELECT 5000::NUMERIC,              "payloadId", block_number FROM event_5000_payloadexecuted_da608
        UNION ALL
        SELECT 4326::NUMERIC,              "payloadId", block_number FROM event_4326_payloadexecuted_da608
        UNION ALL
        SELECT 196::NUMERIC,               "payloadId", block_number FROM event_196_payloadexecuted_da608
    ) t
  - |
    CREATE OR REPLACE VIEW aave_blocks AS
    SELECT chain_id, block_number, block_timestamp
    FROM (
        SELECT 1::NUMERIC       AS chain_id, block_number, block_timestamp FROM blocks_1
        UNION ALL
        SELECT 137::NUMERIC,               block_number, block_timestamp FROM blocks_137
        UNION ALL
        SELECT 43114::NUMERIC,             block_number, block_timestamp FROM blocks_43114
        UNION ALL
        SELECT 42161::NUMERIC,             block_number, block_timestamp FROM blocks_42161
        UNION ALL
        SELECT 10::NUMERIC,                block_number, block_timestamp FROM blocks_10
        UNION ALL
        SELECT 56::NUMERIC,                block_number, block_timestamp FROM blocks_56
        UNION ALL
        SELECT 8453::NUMERIC,              block_number, block_timestamp FROM blocks_8453
        UNION ALL
        SELECT 1088::NUMERIC,              block_number, block_timestamp FROM blocks_1088
        UNION ALL
        SELECT 100::NUMERIC,               block_number, block_timestamp FROM blocks_100
        UNION ALL
        SELECT 42220::NUMERIC,             block_number, block_timestamp FROM blocks_42220
        UNION ALL
        SELECT 59144::NUMERIC,             block_number, block_timestamp FROM blocks_59144
        UNION ALL
        SELECT 534352::NUMERIC,            block_number, block_timestamp FROM blocks_534352
        UNION ALL
        SELECT 1868::NUMERIC,              block_number, block_timestamp FROM blocks_1868
        UNION ALL
        SELECT 146::NUMERIC,               block_number, block_timestamp FROM blocks_146
        UNION ALL
        SELECT 324::NUMERIC,               block_number, block_timestamp FROM blocks_324
        UNION ALL
        SELECT 57073::NUMERIC,             block_number, block_timestamp FROM blocks_57073
        UNION ALL
        SELECT 9745::NUMERIC,              block_number, block_timestamp FROM blocks_9745
        UNION ALL
        SELECT 60808::NUMERIC,             block_number, block_timestamp FROM blocks_60808
        UNION ALL
        SELECT 5000::NUMERIC,              block_number, block_timestamp FROM blocks_5000
        UNION ALL
        SELECT 4326::NUMERIC,              block_number, block_timestamp FROM blocks_4326
        UNION ALL
        SELECT 196::NUMERIC,               block_number, block_timestamp FROM blocks_196
    ) t
  - |
    CREATE OR REPLACE VIEW aave_proposal_execution_status AS
    SELECT
        ps."proposalId",
        COUNT(*)           AS total_payloads,
        COUNT(pe.chain_id) AS executed_payloads
    FROM event_1_payloadsent_9c687 ps
    LEFT JOIN aave_payload_executions pe
        ON pe.chain_id = ps."chainId" AND pe."payloadId" = ps."payloadId"
    GROUP BY ps."proposalId"
  - |
    CREATE OR REPLACE VIEW aave_proposals AS
    SELECT
        pc."proposalId",
        pc."creator",
        pc."accessLevel"::TEXT AS "accessLevel",
        pc."ipfsHash",
        va."snapshotBlockHash",
        COALESCE(va."votingDuration", '259200') AS "votingDuration",
        COALESCE(pq."votesFor",     pf."votesFor",     ve_agg."liveVotesFor"::TEXT,     '0') AS "votesFor",
        COALESCE(pq."votesAgainst", pf."votesAgainst", ve_agg."liveVotesAgainst"::TEXT, '0') AS "votesAgainst",
        CASE
            WHEN pcan."proposalId" IS NOT NULL THEN 6
            WHEN pex."proposalId"  IS NOT NULL
                 AND (pes."proposalId" IS NULL OR pes.total_payloads = pes.executed_payloads)
                                               THEN 4
            WHEN pf."proposalId"   IS NOT NULL THEN 5
            WHEN pq."proposalId"   IS NOT NULL THEN 3
            WHEN va."proposalId"   IS NOT NULL THEN 2
            ELSE 1
        END AS state,
        b_pc.block_timestamp   AS "createdAt",
        b_va.block_timestamp   AS "votingActivatedAt",
        COALESCE(b_pq.block_timestamp, b_pf.block_timestamp) AS "closedAt",
        b_pex.block_timestamp  AS "executedAt",
        b_pcan.block_timestamp AS "canceledAt",
        json_build_object(
            'id',               '0',
            'precisionDivider', '1000000000000000000',
            'cooldownPeriod',   '0',
            'expirationTime',   '2592000',
            'cancellationFee',  '0'
        ) AS constants
    FROM event_1_proposalcreated_cc914 pc
    LEFT JOIN blocks_1 b_pc    ON b_pc.block_number   = pc.block_number
    LEFT JOIN event_1_votingactivated_45f1d  va   ON va."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_va    ON b_va.block_number   = va.block_number
    LEFT JOIN event_1_proposalqueued_e39e7   pq   ON pq."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_pq    ON b_pq.block_number   = pq.block_number
    LEFT JOIN event_1_proposalfailed_2bed8   pf   ON pf."proposalId"   = pc."proposalId"
    LEFT JOIN blocks_1 b_pf    ON b_pf.block_number   = pf.block_number
    LEFT JOIN event_1_proposalexecuted_712ae pex  ON pex."proposalId"  = pc."proposalId"
    LEFT JOIN blocks_1 b_pex   ON b_pex.block_number  = pex.block_number
    LEFT JOIN event_1_proposalcanceled_789cf pcan ON pcan."proposalId" = pc."proposalId"
    LEFT JOIN blocks_1 b_pcan  ON b_pcan.block_number = pcan.block_number
    LEFT JOIN aave_proposal_execution_status pes  ON pes."proposalId"  = pc."proposalId"
    LEFT JOIN (
        SELECT
            "proposalId",
            SUM(CASE WHEN "support" = 'true'  THEN "votingPower" ELSE 0 END) AS "liveVotesFor",
            SUM(CASE WHEN "support" = 'false' THEN "votingPower" ELSE 0 END) AS "liveVotesAgainst"
        FROM (
            SELECT "proposalId", "support", "votingPower" FROM event_1_voteemitted_0c611
            UNION ALL
            SELECT "proposalId", "support", "votingPower" FROM event_137_voteemitted_0c611
            UNION ALL
            SELECT "proposalId", "support", "votingPower" FROM event_43114_voteemitted_0c611
        ) ve
        GROUP BY "proposalId"
    ) ve_agg ON ve_agg."proposalId" = pc."proposalId"
  - |
    CREATE OR REPLACE VIEW aave_payloads AS
    SELECT
        ps."proposalId",
        ps."payloadId",
        ps."payloadsController",
        ps."chainId",
        ps."payloadNumberOnProposal",
        ps."numberOfPayloadsOnProposal",
        ps.block_number,
        b.block_timestamp AS "sentAt"
    FROM event_1_payloadsent_9c687 ps
    LEFT JOIN blocks_1 b ON b.block_number = ps.block_number
  - |
    CREATE OR REPLACE VIEW aave_payload_created_events AS
    SELECT chain_id, "payloadId", "creator", "maximumAccessLevelRequired", block_number
    FROM (
        SELECT 1::NUMERIC       AS chain_id, "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_1_payloadcreated_1e458
        UNION ALL
        SELECT 137::NUMERIC,               "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_137_payloadcreated_1e458
        UNION ALL
        SELECT 43114::NUMERIC,             "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_43114_payloadcreated_1e458
        UNION ALL
        SELECT 42161::NUMERIC,             "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_42161_payloadcreated_1e458
        UNION ALL
        SELECT 10::NUMERIC,                "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_10_payloadcreated_1e458
        UNION ALL
        SELECT 56::NUMERIC,                "payloadId", "creator", "maximumAccessLevelRequired", block_number FROM event_56_payloadcreated_1e458
        UNION ALL
